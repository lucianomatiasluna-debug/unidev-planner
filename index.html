<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Unidev Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f7f8;
            --white: #ffffff;
            --border: #e5e5e5;
            --border-light: #f0f0f2;
            --text-dark: #1a1a1a;
            --text-mid: #555555;
            --text-muted: #999999;
            --accent: #2383e2;
            --accent-light: #e8f0fe;
            --red-marker: #eb5757;

            --cat-work: #2383e2;
            --cat-work-bg: #e8f0fe;
            --cat-travel: #d9730d;
            --cat-travel-bg: #fdecd3;
            --cat-study: #6940a5;
            --cat-study-bg: #ece4f6;
            --cat-eat: #0f7b6c;
            --cat-eat-bg: #daf1ee;
            --cat-rest: #d44c96;
            --cat-rest-bg: #f8e1ef;
            --cat-exam: #e03e3e;
            --cat-exam-bg: #fce4e4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DIN', 'DIN Alternate', 'Barlow', -apple-system, sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
        }

        /* ═══════ RESPONSIVE SHELL ═══════ */
        .shell {
            width: 100%;
            max-width: 1100px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        @media (min-width: 768px) {
            .shell {
                flex-direction: row;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }

        /* ═══════ SIDEBAR (Desktop only) ═══════ */
        .sidebar {
            display: none;
        }

        @media (min-width: 768px) {
            .sidebar {
                display: flex;
                flex-direction: column;
                width: 300px;
                min-width: 300px;
                border-right: 1px solid var(--border);
                background: var(--bg);
                padding: 1.5rem;
                gap: 1.5rem;
                overflow-y: auto;
            }
        }

        .sidebar-logo {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
        }

        .sidebar-logo span {
            font-weight: 300;
            color: var(--text-muted);
        }

        /* ═══════ MAIN CONTENT ═══════ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* ═══════ TOP BAR (Mobile) ═══════ */
        .mobile-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .mobile-top { display: none; }
        }

        .mobile-title {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: -0.3px;
        }

        .clock {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.8px;
        }

        /* ═══════ TABS ═══════ */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .tabs { display: none; }
        }

        .tab {
            padding: 0.8rem 0;
            text-align: center;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            font-family: inherit;
        }

        .tab.active { color: var(--text-dark); font-weight: 600; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20%; width: 60%; height: 2px;
            background: var(--text-dark);
            border-radius: 2px;
        }

        /* ═══════ VIEWS ═══════ */
        .view {
            flex: 1;
            display: none;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .view.active { display: flex; }

        @media (min-width: 768px) {
            .view { display: flex !important; }
            #view-cal { display: none !important; }
        }

        /* ═══════ DATE BANNER ═══════ */
        .banner {
            padding: 0.75rem 1.2rem;
            font-size: 0.92rem;
            color: var(--text-mid);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .banner strong { font-weight: 600; color: var(--text-dark); }

        .phase-pill {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
        }

        .phase-pill.study { background: var(--cat-study-bg); color: var(--cat-study); }
        .phase-pill.exam  { background: var(--cat-exam-bg);  color: var(--cat-exam); animation: blink 2s infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* ═══════ TIMELINE ═══════ */
        .timeline-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.5rem 0.8rem 5rem 0;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 768px) {
            .timeline-wrap { padding: 0.8rem 1.5rem 3rem 0; }
        }

        .tl {
            position: relative;
            margin-left: 56px;
            border-left: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .tl { margin-left: 72px; }
        }

        .tl-row {
            position: relative;
            height: 60px;
            border-bottom: 1px dashed var(--border-light);
        }

        @media (min-width: 768px) {
            .tl-row { height: 72px; }
        }

        .tl-label {
            position: absolute;
            top: -8px;
            width: 46px;
            text-align: right;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.4px;
            left: -56px;
        }

        @media (min-width: 768px) {
            .tl-label { left: -72px; width: 60px; font-size: 0.78rem; }
        }

        /* ═══════ BLOCKS ═══════ */
        .blk {
            position: absolute;
            left: 10px;
            right: 10px;
            border-radius: 6px;
            padding: 0.45rem 0.7rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
            z-index: 5;
        }

        .blk:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .blk:active { transform: scale(0.97); }

        @media (min-width: 768px) {
            .blk { left: 14px; right: 14px; padding: 0.5rem 0.9rem; border-radius: 8px; }
        }

        .blk-name { font-weight: 600; font-size: 0.84rem; line-height: 1.25; }
        .blk-time { font-size: 0.7rem; font-weight: 400; margin-top: 1px; }

        @media (min-width: 768px) {
            .blk-name { font-size: 0.9rem; }
            .blk-time { font-size: 0.75rem; }
        }

        .blk-work   { background: var(--cat-work-bg);   border-color: var(--cat-work); }
        .blk-work   .blk-name { color: var(--cat-work); }
        .blk-work   .blk-time { color: rgba(35,131,226,0.6); }
        .blk-travel { background: var(--cat-travel-bg); border-color: var(--cat-travel); }
        .blk-travel .blk-name { color: var(--cat-travel); }
        .blk-travel .blk-time { color: rgba(217,115,13,0.6); }
        .blk-study  { background: var(--cat-study-bg);  border-color: var(--cat-study); }
        .blk-study  .blk-name { color: var(--cat-study); }
        .blk-study  .blk-time { color: rgba(105,64,165,0.6); }
        .blk-eat    { background: var(--cat-eat-bg);    border-color: var(--cat-eat); }
        .blk-eat    .blk-name { color: var(--cat-eat); }
        .blk-eat    .blk-time { color: rgba(15,123,108,0.6); }
        .blk-rest   { background: var(--cat-rest-bg);   border-color: var(--cat-rest); }
        .blk-rest   .blk-name { color: var(--cat-rest); }
        .blk-rest   .blk-time { color: rgba(212,76,150,0.6); }
        .blk-exam   { background: var(--cat-exam-bg);   border-color: var(--cat-exam); }
        .blk-exam   .blk-name { color: var(--cat-exam); }
        .blk-exam   .blk-time { color: rgba(224,62,62,0.6); }

        /* ═══════ NOW LINE ═══════ */
        .now {
            position: absolute;
            left: -8px; right: 0;
            height: 2px;
            background: var(--red-marker);
            z-index: 10;
            pointer-events: none;
        }

        .now::before {
            content: '';
            position: absolute;
            left: 0; top: -4px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--red-marker);
            box-shadow: 0 0 6px rgba(235,87,87,0.5);
        }

        .empty-msg {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .empty-msg span { font-size: 2rem; display: block; margin-bottom: 0.6rem; }

        /* ═══════ ACTION STRIP ═══════ */
        .actions {
            display: flex;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .act-btn {
            flex: 1;
            padding: 0.5rem;
            text-align: center;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-mid);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .act-btn:hover { background: var(--border-light); }
        .act-btn.danger { color: var(--red-marker); }

        /* ═══════ CALENDAR (Notion Style) ═══════ */
        .cal-panel {
            display: flex;
            flex-direction: column;
            gap: 0;
            height: 100%;
        }

        @media (min-width: 768px) {
            .cal-panel { padding: 0; }
        }

        /* Mini Month */
        .mini-cal {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .mini-cal { padding: 1.2rem 1.5rem; }
        }

        .cal-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .cal-nav-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.65rem;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-mid);
            transition: background 0.15s;
        }

        .cal-nav-btn:hover { background: var(--bg); }

        .cal-month-lbl {
            font-size: 1rem;
            font-weight: 600;
            text-transform: capitalize;
            letter-spacing: -0.3px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .cal-wk {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0.4rem 0;
        }

        .cal-d {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .cal-d:hover { background: var(--bg); }
        .cal-d.today { background: var(--text-dark); color: #fff; font-weight: 600; }
        .cal-d.sel { border: 2px solid var(--accent); font-weight: 600; color: var(--text-dark); }
        .cal-d.today.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
        .cal-d.has::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background: var(--cat-study); }
        .cal-d.today.has::after { background: rgba(255,255,255,0.7); }
        .cal-d.has-exam::after { background: var(--cat-exam) !important; width:5px; height:5px; }
        .cal-d.other { color: var(--text-muted); opacity: 0.35; }

        /* Day Detail (below mini cal) */
        .day-detail {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem 1.2rem 5rem;
        }

        @media (min-width: 768px) {
            .day-detail { padding: 1.2rem 1.5rem 3rem; }
        }

        .dd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border-light);
        }

        .dd-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .dd-count {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .evt {
            display: flex;
            align-items: stretch;
            gap: 0.7rem;
            padding: 0.55rem 0;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: background 0.12s;
            border-radius: 6px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .evt:hover { background: var(--bg); }

        .evt-stripe {
            width: 3px;
            border-radius: 2px;
            flex-shrink: 0;
            align-self: stretch;
        }

        .evt-body { flex: 1; min-width: 0; }
        .evt-name { font-size: 0.9rem; font-weight: 500; line-height: 1.3; }
        .evt-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; margin-top: 1px; }

        /* ═══════ FAB ═══════ */
        .fab {
            position: fixed;
            bottom: 1.2rem;
            right: 1.2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--text-dark);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            z-index: 80;
            transition: transform 0.12s;
        }

        .fab:active { transform: scale(0.88); }

        @media (min-width: 768px) {
            .fab { bottom: 2rem; right: calc(50% - 530px); width: 48px; height: 48px; }
        }

        /* ═══════ DRAWER ═══════ */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.2); backdrop-filter:blur(2px); z-index:90; }

        .drawer {
            display: none;
            position: fixed;
            z-index: 100;
            animation: slideUp 0.2s ease-out;
        }

        /* Mobile: bottom sheet */
        @media (max-width: 767px) {
            .drawer {
                bottom: 0; left: 0; right: 0;
                background: var(--white);
                border-top: 1px solid var(--border);
                border-radius: 1.2rem 1.2rem 0 0;
                padding: 1.4rem;
                box-shadow: 0 -6px 30px rgba(0,0,0,0.08);
            }
        }

        /* Desktop: centered modal */
        @media (min-width: 768px) {
            .drawer {
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                width: 400px;
                background: var(--white);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 1.5rem;
                box-shadow: 0 20px 60px rgba(0,0,0,0.1);
                animation: fadeIn 0.2s ease-out;
            }
        }

        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        @keyframes fadeIn  { from{opacity:0;transform:translate(-50%,-48%)} to{opacity:1;transform:translate(-50%,-50%)} }

        .dr-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; }
        .dr-head h3 { font-size:1rem; font-weight:600; letter-spacing:0.3px; }
        .dr-close { background:none; border:none; font-size:1.4rem; color:var(--text-muted); cursor:pointer; padding:0.2rem; }

        .fld { margin-bottom: 0.9rem; }
        .fld label { display:block; font-size:0.7rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:0.3rem; }
        .fld input, .fld select { width:100%; padding:0.65rem 0.75rem; font-family:inherit; font-size:0.9rem; font-weight:400; color:var(--text-dark); background:var(--bg); border:1px solid var(--border); border-radius:6px; }
        .fld input:focus, .fld select:focus { outline:none; border-color:var(--accent); box-shadow: 0 0 0 2px rgba(35,131,226,0.15); }
        .fld-row { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; }

        .btn-save { width:100%; padding:0.75rem; background:var(--text-dark); color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:0.9rem; font-weight:600; cursor:pointer; margin-top:0.3rem; }
        .btn-save:active { opacity:0.8; }
    </style>
</head>
<body>

<div class="shell">

    <!-- ═══ SIDEBAR (Desktop) ═══ -->
    <aside class="sidebar" id="sidebar">
        <div>
            <div class="sidebar-logo">Unidev <span>Planner</span></div>
        </div>
        <!-- Mini Calendar lives here on desktop -->
        <div id="sidebar-cal"></div>
        <!-- Day detail lives here on desktop -->
        <div id="sidebar-detail" style="flex:1;overflow-y:auto;"></div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <div class="main">

        <div class="mobile-top">
            <div class="mobile-title">Planner</div>
            <div class="clock" id="clock">--:--</div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-today" onclick="switchTab('today')">Rutina Hoy</button>
            <button class="tab" id="tab-cal" onclick="switchTab('cal')">Calendario</button>
        </div>

        <!-- TODAY VIEW -->
        <div class="view active" id="view-today">
            <div class="banner" id="today-banner"></div>
            <div class="timeline-wrap" id="tl-scroll">
                <div class="tl" id="tl">
                    <div class="now" id="now-line"></div>
                    <div id="tl-ticks"></div>
                    <div id="tl-blocks"></div>
                </div>
            </div>
            <div class="actions">
                <button class="act-btn" onclick="seedAll()">Recargar Rutina</button>
                <button class="act-btn danger" onclick="clearToday()">Vaciar Día</button>
            </div>
        </div>

        <!-- CALENDAR VIEW (Mobile only; Desktop uses sidebar) -->
        <div class="view" id="view-cal">
            <div class="cal-panel">
                <div class="mini-cal" id="mob-mini-cal"></div>
                <div class="day-detail" id="mob-day-detail"></div>
            </div>
        </div>

    </div>
</div>

<button class="fab" onclick="openDr()">+</button>
<div class="overlay" id="overlay" onclick="closeDr()"></div>
<div class="drawer" id="drawer">
    <div class="dr-head">
        <h3>Nueva Actividad</h3>
        <button class="dr-close" onclick="closeDr()">×</button>
    </div>
    <form id="frm" onsubmit="saveAct(event)">
        <div class="fld"><label>Nombre</label><input type="text" id="f-name" placeholder="Ej: Clase de Física" required></div>
        <div class="fld"><label>Categoría</label>
            <select id="f-cat" required>
                <option value="work">💼  Trabajo</option>
                <option value="travel">🚗  Viaje</option>
                <option value="study">📚  Estudio</option>
                <option value="eat">🍽️  Comer</option>
                <option value="rest">😴  Descanso</option>
                <option value="exam">📝  Examen</option>
            </select>
        </div>
        <div class="fld"><div class="fld-row">
            <div><label>Inicio</label><input type="time" id="f-start" required></div>
            <div><label>Fin</label><input type="time" id="f-end" required></div>
        </div></div>
        <button type="submit" class="btn-save">Guardar</button>
    </form>
</div>

<script>
/* ─── CONFIG ─── */
const HS=8, HE=24;
let PX_H=60;
function recalcPx(){PX_H=window.innerWidth>=768?72:60;}
recalcPx(); window.addEventListener('resize',()=>{recalcPx();renderToday();renderCal();});

/* ─── STATE ─── */
let curTab='today', calY, calM, calSel=null;
const DN=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const exams={'2026-06-16':'Parcial Prob y Est','2026-06-19':'Parcial Único Física 1','2026-07-01':'Parcial Costos Ind.'};

function tk(){const d=new Date();return `${d.getFullYear()}-${S(d.getMonth()+1)}-${S(d.getDate())}`;}
function dk(y,m,d){return `${y}-${S(m+1)}-${S(d)}`;}
function S(n){return String(n).padStart(2,'0');}
function sk(d){return `unidev_plan_${d}`;}
function gb(d){return JSON.parse(localStorage.getItem(sk(d))||'[]');}
function sb(d,a){localStorage.setItem(sk(d),JSON.stringify(a));}
function t2d(t){const[h,m]=t.split(':').map(Number);return h+m/60;}
function phase(d){if(d>='2026-06-01'&&d<='2026-06-19')return{t:'Fase 1 · Prob&Est + Física',c:'study'};if(d>='2026-06-20'&&d<='2026-07-01')return{t:'Fase 2 · Costos',c:'study'};return null;}
const cmap={work:'#2383e2',travel:'#d9730d',study:'#6940a5',eat:'#0f7b6c',rest:'#d44c96',exam:'#e03e3e'};

/* ─── TABS ─── */
function switchTab(v){
    curTab=v;
    document.getElementById('tab-today').classList.toggle('active',v==='today');
    document.getElementById('tab-cal').classList.toggle('active',v==='cal');
    document.getElementById('view-today').classList.toggle('active',v==='today');
    document.getElementById('view-cal').classList.toggle('active',v==='cal');
    if(v==='today')renderToday();else renderCal();
}

/* ─── TODAY ─── */
function renderToday(){
    const now=new Date(),key=tk(),bl=gb(key),ph=phase(key),ex=exams[key];
    let badge='';
    if(ex)badge=`<span class="phase-pill exam">📝 ${ex}</span>`;
    else if(ph)badge=`<span class="phase-pill ${ph.c}">${ph.t}</span>`;
    else badge=`<span style="font-size:0.8rem;color:var(--text-muted)">${bl.length} actividad${bl.length!==1?'es':''}</span>`;
    document.getElementById('today-banner').innerHTML=`<span><strong>${DN[now.getDay()]}</strong>, ${now.getDate()} de ${MN[now.getMonth()]}</span>${badge}`;

    const ticks=document.getElementById('tl-ticks');ticks.innerHTML='';
    for(let h=HS;h<=HE;h++){const r=document.createElement('div');r.className='tl-row';const l=document.createElement('span');l.className='tl-label';l.textContent=h===24?'00:00':`${S(h)}:00`;r.appendChild(l);ticks.appendChild(r);}

    const layer=document.getElementById('tl-blocks');layer.innerHTML='';
    if(!bl.length){layer.innerHTML='<div class="empty-msg"><span>📋</span>Sin actividades hoy.<br>Toca <b>+</b> para agregar.</div>';
    }else{bl.forEach(b=>{
        const s=Math.max(HS,t2d(b.start)),e=Math.min(HE,t2d(b.end));if(e<=s)return;
        const el=document.createElement('div');el.className=`blk blk-${b.category}`;
        el.style.top=`${(s-HS)*PX_H}px`;el.style.height=`${(e-s)*PX_H}px`;
        el.innerHTML=`<span class="blk-name">${b.name}</span><span class="blk-time">${b.start} – ${b.end}</span>`;
        el.onclick=()=>{if(confirm(`¿Borrar "${b.name}"?`)){sb(key,gb(key).filter(x=>x.id!==b.id));renderToday();}};
        layer.appendChild(el);
    });}
    updateNow();
}

function updateNow(){
    const l=document.getElementById('now-line'),n=new Date(),d=n.getHours()+n.getMinutes()/60;
    if(d>=HS&&d<=HE){l.style.display='block';l.style.top=`${(d-HS)*PX_H}px`;}else{l.style.display='none';}
}

/* ─── CALENDAR ─── */
function renderCal(){
    const isDesktop=window.innerWidth>=768;
    const calContainer=isDesktop?document.getElementById('sidebar-cal'):document.getElementById('mob-mini-cal');
    const detailContainer=isDesktop?document.getElementById('sidebar-detail'):document.getElementById('mob-day-detail');

    calContainer.innerHTML=buildMiniCal();
    detailContainer.innerHTML=buildDayDetail();
}

function buildMiniCal(){
    const todayStr=tk();
    let h=`<div class="cal-nav"><button class="cal-nav-btn" onclick="chgM(-1)">‹</button><span class="cal-month-lbl">${MN[calM]} ${calY}</span><button class="cal-nav-btn" onclick="chgM(1)">›</button></div>`;
    h+='<div class="cal-grid">';
    ['L','M','M','J','V','S','D'].forEach(d=>{h+=`<div class="cal-wk">${d}</div>`;});
    const fd=new Date(calY,calM,1);let sw=fd.getDay();sw=sw===0?6:sw-1;
    const dim=new Date(calY,calM+1,0).getDate();
    const dpm=new Date(calY,calM,0).getDate();
    for(let i=sw-1;i>=0;i--)h+=`<div class="cal-d other">${dpm-i}</div>`;
    for(let d=1;d<=dim;d++){
        const k=dk(calY,calM,d);let cls='cal-d';
        if(k===todayStr)cls+=' today';if(k===calSel)cls+=' sel';
        if(gb(k).length)cls+=' has';if(exams[k])cls+=' has-exam';
        h+=`<div class="${cls}" onclick="selDay('${k}')">${d}</div>`;
    }
    const tc=sw+dim;const rem=tc%7===0?0:7-tc%7;
    for(let i=1;i<=rem;i++)h+=`<div class="cal-d other">${i}</div>`;
    h+='</div>';
    return h;
}

function buildDayDetail(){
    if(!calSel)return '<div class="empty-msg" style="padding:2rem 0">Selecciona un día del calendario.</div>';
    const bl=gb(calSel),dObj=new Date(calSel+'T12:00:00');
    const label=`${DN[dObj.getDay()]} ${dObj.getDate()} de ${MN[dObj.getMonth()]}`;
    const ex=exams[calSel],ph=phase(calSel);
    let h=`<div class="dd-header"><div class="dd-title">${label}</div><div class="dd-count">${bl.length} actividad${bl.length!==1?'es':''}</div></div>`;
    if(ex)h+=`<div style="background:var(--cat-exam-bg);color:var(--cat-exam);padding:0.45rem 0.7rem;border-radius:6px;font-weight:600;font-size:0.82rem;margin-bottom:0.8rem;">📝 ${ex}</div>`;
    else if(ph)h+=`<div style="background:var(--cat-study-bg);color:var(--cat-study);padding:0.45rem 0.7rem;border-radius:6px;font-weight:500;font-size:0.8rem;margin-bottom:0.8rem;">${ph.t}</div>`;
    if(!bl.length){h+='<div class="empty-msg" style="padding:1.5rem 0"><span>📋</span>Sin actividades.<br>Toca <b>+</b> para agregar.</div>';}
    else{bl.sort((a,b)=>t2d(a.start)-t2d(b.start));bl.forEach(b=>{
        h+=`<div class="evt" onclick="delCal('${b.id}')"><div class="evt-stripe" style="background:${cmap[b.category]||'#aaa'}"></div><div class="evt-body"><div class="evt-name">${b.name}</div><div class="evt-time">${b.start} – ${b.end}</div></div></div>`;
    });}
    return h;
}

function selDay(k){calSel=k;renderCal();}
function delCal(id){if(!calSel||!confirm('¿Borrar esta actividad?'))return;sb(calSel,gb(calSel).filter(x=>x.id!==id));renderCal();}
function chgM(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}calSel=null;renderCal();}

/* ─── DRAWER ─── */
function openDr(){document.getElementById('drawer').style.display='block';document.getElementById('overlay').style.display='block';}
function closeDr(){document.getElementById('drawer').style.display='none';document.getElementById('overlay').style.display='none';}

function saveAct(e){
    e.preventDefault();
    const n=document.getElementById('f-name').value,c=document.getElementById('f-cat').value,
          s=document.getElementById('f-start').value,en=document.getElementById('f-end').value;
    if(t2d(s)>=t2d(en)){alert('La hora de inicio debe ser anterior.');return;}
    let target=(curTab==='cal'&&calSel)?calSel:tk();
    // Desktop: if sidebar has a selected day, use that
    if(window.innerWidth>=768&&calSel)target=calSel;
    const bl=gb(target);bl.push({id:Date.now().toString(),name:n,category:c,start:s,end:en});sb(target,bl);
    closeDr();document.getElementById('f-name').value='';
    renderToday();renderCal();
}

function clearToday(){if(!confirm('¿Vaciar hoy?'))return;sb(tk(),[]);renderToday();}

/* ─── CLOCK ─── */
function tick(){const n=new Date();document.getElementById('clock').textContent=`${S(n.getHours())}:${S(n.getMinutes())}`;updateNow();}

/* ─── INIT ─── */
const now=new Date();calY=now.getFullYear();calM=now.getMonth();calSel=tk();
if(!localStorage.getItem('unidev_seeded_v2')){writeSeed();localStorage.setItem('unidev_seeded_v2','true');}
tick();setInterval(tick,15000);
renderToday();renderCal();

// Auto-scroll timeline to current hour
setTimeout(()=>{
    const sc=document.getElementById('tl-scroll');
    const h=new Date().getHours();
    if(h>=HS)sc.scrollTop=Math.max(0,(h-HS-1)*PX_H);
},100);
